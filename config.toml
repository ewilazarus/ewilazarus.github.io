baseURL = "https://ewilazarus.github.io"
title = "Ewilogs"
theme = "hugo-coder"
languageCode = "en-us"
defaultcontentlanguage = "en-us"

paginate = 20
canonifyurls = true

pygmentsstyle = "bw"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[params]
    author = "Gabriel Lima"
    info = "Programmer @ BTG Pactual, São Paulo"
    description = "Gabriel Lima's personal website"
    keywords = "blog,developer,personal"
    avatarurl = "images/avatar.jpg"

    favicon_32 = "/img/favicon-32x32.png"
    favicon_16 = "/img/favicon-16x16.png"

    footercontent = "Alis grave nil"

    hidecredits = false
    hidecopyright = false

    rtl = false

    math = true
    custom_css = ["css/custom.css"]

# Social links
